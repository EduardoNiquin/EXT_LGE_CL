<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./popup.css" />
  <title>LGE CL Tools</title>
</head>
<body data-context="sidepanel">
  <header class="header">
    <button id="back-btn" class="back-btn hidden" aria-label="Volver">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-brand">
      <span class="header-accent-bar"></span>
      <span class="header-title" id="header-title">LGE CL Tools</span>
    </div>
    <button id="panel-toggle" class="panel-toggle" aria-label="Minimizar">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M14 2L9.5 6.5M9.5 6.5H13.5M9.5 6.5V2.5M2 14l4.5-4.5M6.5 9.5H2.5M6.5 9.5V13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="header-version">v0.1</span>
  </header>
  <main id="app"></main>
  <script type="module" src="./popup.js"></script>
</body>
</html>
